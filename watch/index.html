<!DOCTYPE html>
<html>
<head>
<title>RawTube</title>
<link rel="icon" href="https://www.youtube.com/s/desktop/1daead2b/img/favicon.ico">
<style>
body {
	margin: 0;
	overflow: hidden;
}

#player {
	width: 100vw;
	height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
}
</style>
</head>
<body>
	<div id="player"></div>
	<script>
		const url = new URL(window.location.href);
		const videoId = url.searchParams.get('v');
		if (videoId === null) {
			player.innerText = 'No video ID provided. Use ?v= parameter'
		} else {
			url.search = '';
			url.searchParams.set('v', videoId);
			history.replaceState(null, '', url.toString());

			let tag = document.createElement('script');
			tag.src = 'https://www.youtube.com/iframe_api';
			document.head.appendChild(tag);
			function onYouTubeIframeAPIReady() {
				new YT.Player('player', {
					videoId,
					events: {
						onReady: (e) => {
							document.title = `${e.target.getVideoData().title} - RawTube`;
						},
					},
				});
			};
		}
	</script>
</body>
</html>
